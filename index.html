<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>会捣乱的积木 · 订单建造</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: url('background.png') center/cover no-repeat fixed;
    color: #eee; overflow: hidden;
  }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; }
  #main { display: flex; align-items: flex-start; gap: 14px; }

  /* 左侧材料库(素描手绘风:纸片底 + 柔墨描边 + 楷体) */
  #panel {
    width: 220px; flex-shrink: 0; max-height: calc(100vh - 32px);
    background: url('tipback.png') center/cover no-repeat, #f4efe1;
    border: 1.5px solid #6b6354; box-shadow: 2px 2px 0 rgba(107,99,84,.45);
    padding: 16px; border-radius: 14px; color: #3a352c;
    display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
    font-family: "STKaiti","KaiTi","楷体",cursive;
  }
  #panel h2 { font-size: 19px; font-weight: 800; margin-bottom: 2px; letter-spacing: 1px; }
  #panel .tip { font-size: 12px; margin-bottom: 6px; line-height: 1.5; white-space: nowrap; color: #8a1f1f; font-weight: 700; }
  .brick-btn {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 10px; cursor: pointer; border: 1.5px solid #8a8170;
    background: rgba(255,253,245,.7); transition: .12s; position: relative;
    box-shadow: 1px 1px 0 rgba(107,99,84,.35);
  }
  .brick-btn:hover { transform: translate(-1px,-1px); box-shadow: 2px 2px 0 rgba(107,99,84,.4); background: #fffdf5; }
  .brick-btn.active { border-color: #6b6354; background: #ffe9a8; box-shadow: 2px 2px 0 rgba(107,99,84,.4); }
  .brick-btn.empty { opacity: .4; cursor: not-allowed; box-shadow: none; transform: none; }
  .swatch { width: 24px; height: 24px; border-radius: 5px; flex-shrink: 0; border: 1.5px solid #8a8170; }
  .brick-btn .info { font-size: 12px; line-height: 1.3; flex: 1; }
  .brick-btn .info b { font-size: 14px; }
  .brick-btn .info span { opacity: .7; white-space: nowrap; }
  .brick-btn .qty { font-size: 18px; font-weight: bold; min-width: 24px; text-align: right; padding-right: 6px; flex-shrink: 0; }

  /* 中间舞台 */
  #stage { flex: 0 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #topbar {
    display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; width: 100%;
  }
  .stat {
    background: rgba(255,253,245,.92); color: #3a352c;
    border: 1.5px solid #6b6354; box-shadow: 1px 1px 0 rgba(107,99,84,.4);
    padding: 0 14px; height: 42px; border-radius: 12px; font-size: 14px; white-space: nowrap;
    flex: 0 0 auto; display: flex; align-items: center; box-sizing: border-box;
    font-family: "STKaiti","KaiTi","楷体",cursive; font-weight: 700;
  }
  .stat b { font-size: 18px; margin: 0 6px; }
  #progwrap { flex: 0 1 280px; min-width: 200px; display: flex; align-items: center; gap: 8px; }
  #progbar { flex: 1; height: 12px; border-radius: 6px; background: rgba(42,42,42,.1); border: 1.5px solid #8a8170; overflow: hidden; }
  #progbar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#6dd86d,#5dd6e8); transition: width .2s; }
  #order { flex: 0 0 auto; width: 184px; overflow: hidden; text-overflow: ellipsis; }
  #timer { padding: 0 22px; font-weight: 800; }
  #timer .timer-ico { height: 22px; width: auto; vertical-align: -5px; }
  #timer b { font-size: 24px; font-weight: 900; }
  #timer.low b { color: #e8503a; }
  #reset, #pause { cursor: pointer; font-family: "STKaiti","KaiTi","楷体",cursive; transition: .12s; }
  #reset:hover, #pause:hover { transform: translate(-1px,-1px); box-shadow: 2px 2px 0 rgba(107,99,84,.45); background: #fffdf5; }
  #reset:active, #pause:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(107,99,84,.4); }

  #pausemask {
    position: fixed; inset: 0; background: rgba(0,0,0,.18); display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    z-index: 8; cursor: pointer; font-size: 30px;
    text-shadow: 0 2px 8px rgba(0,0,0,.9);
  }
  #pausemask span { font-size: 14px; opacity: .85; }

  #countdown {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    font-size: 130px; font-weight: bold; color: #fff; z-index: 12; pointer-events: none;
    text-shadow: 0 4px 24px rgba(0,0,0,.65);
  }
  #countdown.pop { animation: cdpop .55s ease-out; }
  @keyframes cdpop {
    0%   { transform: scale(2.4); opacity: 0; }
    35%  { transform: scale(1);   opacity: 1; }
    100% { transform: scale(1);   opacity: .85; }
  }

  /* 底部常驻关卡条(素描手绘风) */
  #lvbar {
    margin-top: 12px;
    display: flex; gap: 8px;
    background: rgba(255,253,245,.92); border: 1.5px solid #6b6354; box-shadow: 2px 2px 0 rgba(107,99,84,.4);
    padding: 8px 12px; border-radius: 16px;
    max-width: 100%; overflow-x: auto;
  }
  .lvchip {
    width: 54px; flex-shrink: 0; padding: 6px 4px; border-radius: 10px; cursor: pointer;
    border: 1.5px solid #8a8170; background: #fffdf5; color: #3a352c;
    font-family: "STKaiti","KaiTi","楷体",cursive; text-align: center; transition: .12s;
    box-shadow: 1px 1px 0 rgba(107,99,84,.35);
  }
  .lvchip:hover:not(.locked) { transform: translate(-1px,-1px); box-shadow: 2px 2px 0 rgba(107,99,84,.4); }
  .lvchip.locked { opacity: .4; cursor: not-allowed; box-shadow: none; }
  .lvchip.current { border-color: #6b6354; background: #ffe9a8; box-shadow: 2px 2px 0 rgba(107,99,84,.4); }
  .lvchip .ico { font-size: 20px; display: block; line-height: 1.2; }
  .lvchip .ico-img { width: 22px; height: 22px; object-fit: contain; vertical-align: middle; display: inline-block; }
  .lvchip .n { font-size: 10px; opacity: .8; }
  canvas { border-radius: 10px; background: transparent; cursor: pointer; }
  #hint {
    margin-top: 12px;
    background: rgba(255,253,245,.92); color: #3a352c; border: 1.5px solid #6b6354; box-shadow: 2px 2px 0 rgba(107,99,84,.4);
    padding: 8px 18px; border-radius: 20px; font-size: 14px;
    font-family: "STKaiti","KaiTi","楷体",cursive; font-weight: 700;
  }
  #legend {
    order: 1; margin-top: auto; padding-top: 10px; font-size: 12px; opacity: .8; line-height: 1.8;
    border-top: 1.5px dashed #2a2a2a; color: #2a2a2a; white-space: nowrap;
  }

  #overlay {
    position: fixed; inset: 0; background: rgba(42,42,42,.55); display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 10;
  }
  /* 结束弹窗:素描手绘风(与关卡说明弹窗统一) */
  #overlay .ov-card {
    background: url('tipback.png') center/cover no-repeat;
    border: 1.5px solid #6b6354; border-radius: 16px;
    padding: 30px 40px 34px; width: min(86vw, 460px);
    text-align: center; color: #3a352c;
    box-shadow: 2px 2px 0 rgba(107,99,84,.45);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    animation: introPop .4s cubic-bezier(.2,1.3,.4,1) both;
  }
  #overlay h1 {
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 40px; font-weight: 800; letter-spacing: 2px; color: #3a352c;
    text-shadow: 1.5px 1.5px 0 #cdbfa0;
  }
  #overlay h1 img.ov-icon {
    height: 1em; width: auto; vertical-align: -0.15em; margin-right: 8px;
  }
  #overlay p {
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 17px; line-height: 1.9; opacity: .9;
  }
  #overlay button {
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 20px; font-weight: 700; color: #3a352c;
    background: #fffdf5; border: 1.5px solid #6b6354; border-radius: 14px;
    padding: 10px 40px; cursor: pointer; margin-top: 4px;
    box-shadow: 2px 2px 0 rgba(107,99,84,.45);
    transition: transform .12s, box-shadow .12s;
  }
  #overlay button:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(107,99,84,.5); }
  #overlay button:active { transform: translate(1px,1px);   box-shadow: 1px 1px 0 rgba(107,99,84,.4); }

  /* ---------- 关卡开场说明弹窗(素描手绘风) ---------- */
  #intro {
    position: fixed; inset: 0; background: rgba(42,42,42,.45); display: none;
    align-items: center; justify-content: center; z-index: 11;
  }
  #intro .intro-card {
    background: url('tipback.png') center/cover no-repeat;
    border: 1.5px solid #6b6354; border-radius: 16px;
    padding: 30px 34px 34px; width: min(86vw, 460px);
    text-align: center; color: #3a352c;
    box-shadow: 2px 2px 0 rgba(107,99,84,.45);
    animation: introPop .4s cubic-bezier(.2,1.3,.4,1) both;
  }
  #intro-title {
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 32px; font-weight: 800; letter-spacing: 2px; color: #3a352c;
    text-shadow: 1.5px 1.5px 0 #cdbfa0; margin-bottom: 16px;
  }
  #intro-desc {
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 19px; line-height: 1.95; opacity: .9; margin-bottom: 26px;
  }
  #intro-btn {
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 20px; font-weight: 700; color: #3a352c;
    background: #fffdf5; border: 1.5px solid #6b6354; border-radius: 14px;
    padding: 10px 40px; cursor: pointer;
    box-shadow: 2px 2px 0 rgba(107,99,84,.45);
    transition: transform .12s, box-shadow .12s;
  }
  #intro-btn:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(107,99,84,.5); }
  #intro-btn:active { transform: translate(1px,1px);   box-shadow: 1px 1px 0 rgba(107,99,84,.4); }
  @keyframes introPop { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
  /* ---------- 开屏(素描手绘风) ---------- */
  #splash {
    position: fixed; inset: 0; z-index: 200;
    background-color: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; color: #2a2a2a; text-align: center;
    transition: opacity .5s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  /* 全屏铺满播放的开屏视频 */
  #splash-video {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; background: #000; z-index: 0;
  }
  /* 视频播完后才浮现的标题与按钮(初始隐藏) */
  #splash-ui {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    padding: 30px 40px; border-radius: 18px;
    background: rgba(244,239,225,.86); box-shadow: 0 8px 40px rgba(0,0,0,.45);
    opacity: 0; pointer-events: none; transition: opacity .6s ease;
  }
  #splash-ui.show { opacity: 1; pointer-events: auto; }
  /* 右上角"跳过动画"按钮 */
  #splash-skip {
    position: fixed; top: 18px; right: 18px; z-index: 2;
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 15px; font-weight: 700; color: #fff;
    background: rgba(255,255,255,.16); border: 1.5px solid rgba(255,255,255,.7);
    border-radius: 999px; padding: 7px 18px; cursor: pointer;
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    transition: background .15s, transform .12s;
  }
  #splash-skip:hover { background: rgba(255,255,255,.32); transform: translateY(-1px); }
  #splash-skip:active { transform: translateY(1px); }
  .splash-title {
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 54px; font-weight: 800; letter-spacing: 4px; color:#222;
    text-shadow: 1.5px 1.5px 0 #cdbfa0;
    animation: titlePop .6s cubic-bezier(.2,1.35,.4,1) both;
  }
  .splash-sub {
    font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 16px; opacity: .85; line-height: 1.9; white-space: nowrap;
    animation: splashFade .8s ease .3s both;
  }
  #splash-start {
    margin-top: 8px; font-family: "STKaiti","KaiTi","楷体",cursive;
    font-size: 22px; font-weight: 700; color:#2a2a2a;
    background: #fffdf5; border: 2.5px solid #2a2a2a; border-radius: 14px;
    padding: 11px 44px; cursor: pointer;
    box-shadow: 3px 3px 0 #2a2a2a;
    animation: splashFade .8s ease .5s both;
    transition: transform .12s, box-shadow .12s;
  }
  #splash-start:hover  { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 #2a2a2a; }
  #splash-start:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 #2a2a2a; }
  @keyframes titlePop { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes splashFade { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div class="stat" id="order">第 1/7 关</div>
    <div class="stat" id="timer"><img class="timer-ico" src="clock.png" alt=""> <b>60</b>s</div>
    <button class="stat" id="pause">⏸ 暂停</button>
    <button class="stat" id="reset">↻ 重置本关</button>
    <button class="stat" id="mute">🔊 音效</button>
    <div class="stat" id="progwrap">完成度 <b id="prog-txt">0%</b><div id="progbar"><i></i></div></div>
  </div>
  <div id="main">
    <div id="panel">
      <h2>🧱 材料库</h2>
      <div class="tip">点空格放砖 · 点已放的砖可拆除回收</div>
      <!-- 砖按钮由 JS 注入 -->
      <div id="legend">
        虚线轮廓 = 图纸目标 · 金边 = 填对了
      </div>
    </div>
    <div id="stage">
      <canvas id="cv"></canvas>
      <div id="hint">照着图纸把每个格子填上对应颜色!</div>
      <div id="lvbar"></div>
    </div>
  </div>
  <div id="overlay">
    <div class="ov-card">
      <h1 id="ov-title"></h1>
      <p id="ov-sub"></p>
      <button id="ov-btn"></button>
    </div>
  </div>
  <div id="pausemask">⏸ 已暂停<span>点击此处继续</span></div>
  <div id="countdown"></div>
</div>
<div id="intro">
  <div class="intro-card">
    <div id="intro-title"></div>
    <div id="intro-desc"></div>
    <button id="intro-btn">▶ 开始本关</button>
  </div>
</div>
<div id="splash">
  <video id="splash-video" autoplay muted playsinline preload="auto">
    <source src="welcome.mp4" type="video/mp4">
  </video>
  <button id="splash-skip">跳过动画 ›</button>
  <div id="splash-ui">
    <div class="splash-title">会捣乱的积木</div>
    <div class="splash-sub">每块积木都有自己的脾气——🔴会烧邻格、🟢会蔓延、🔵会腐蚀、⚫会护邻。<br>趁它们捣乱之前，照着图纸拼出订单！</div>
    <button id="splash-start">▶ 开始游戏</button>
  </div>
</div>

<script>
// ---------- 砖块定义(订单模式行为) ----------
const COLORS = {
  red:    '#c9a02c', yellow: '#e85d75', green: '#6dd86d',
  blue:   '#5d9ce8', black:  '#555',    rainbow: 'rainbow'
};
// 砖块图片:按"屏幕上显示的颜色"对应图片(红/黄外观做过对调)
//   type red  显示黄色 → 黄.png ; type yellow 显示红色 → 红.png
const IMG_SRC = { red: '黄.png', yellow: '红.png', green: '绿.png', black: '黑.png' };
const BRICK_IMG = {};
Object.keys(IMG_SRC).forEach(k => { const im = new Image(); im.src = IMG_SRC[k]; BRICK_IMG[k] = im; });
const BRICKS = {
  // 红/黄两种砖的外观与功能已整体对调(红色=烧裂, 黄色=稳定)。
  // 内部 type 标识 red/yellow 保持不变,故关卡图纸 R/Y、烧裂判定等逻辑无需改动:
  //   type 'red'  → 现在表现为黄色·稳定;  type 'yellow' → 现在表现为红色·烧裂。
  red:     { name:'黄砖',  desc:'稳定·无副作用', sfx:'safe' },
  yellow:  { name:'红砖',  desc:'散热·烧裂相邻砖', sfx:'burn' },
  green:   { name:'绿砖',  desc:'成长·向空格蔓延', sfx:'grow' },
  blue:    { name:'蓝砖',  desc:'能量·几秒后腐蚀消失', sfx:'decay' },
  black:   { name:'黑砖',  desc:'稳定剂·保护相邻砖', sfx:'calm' },
  rainbow: { name:'彩虹砖',desc:'万能·匹配任意目标', sfx:'wild' },
};

// ---------- 图纸(字符画;字母=该格目标颜色) ----------
const CH = { R:'red', r:'red', Y:'yellow', G:'green', B:'blue', K:'black', '.':null };
// 小写 r:同样是红砖,但额外标记为"可被黄砖烧"的格子(见 burnableSet)
const LEVELS = [
  // 第1关:红砖(无副作用),教操作
  { name:'❤ 爱心(新手引导)', time:8, locked:[], mystery:[], wild:0, rows:[
    '.R.R.',
    'RRRRR',
    '.RRR.',
    '..R..' ] },
  // 第2关:回字方块 — 黄边、红环、黄心(红砖会烧裂相邻)
  { name:'🟧 回字方块', time:34, locked:[], mystery:[], wild:0, burnMs:3000, burnSlowMs:4500, rows:[
    'RRRRR',
    'RYYYR',
    'RYRYR',
    'RYYYR',
    'RRRRR' ] },
  // 第2关:+黑砖(保护相邻) — 青蛙:大量黑边轮廓,熟悉黑砖;头顶红心,绿身快速蔓延
  { name:'🐸 青蛙 · 认识黑砖', time:30, locked:[], mystery:['black'], wild:0, spreadMs:900, rows:[
    '...Y.Y...',
    '...YYY...',
    '..RR.RR..',
    '.RGR.RGR.',
    '.RGGGGGR.',
    '.GGGGGGG.',
    '.GGRRRGG.',
    '.GGGGGGG.',
    '.........' ] },
  // 第3关:+绿砖(蔓延) — 带茎花
  { name:'🌱 带茎花 · 认识绿砖', time:19, locked:[], mystery:[], wild:0,
    burnRate:0.5, burnMs:900, burnSlowMs:3500, burnAfter:4, redBonus:8, spreadMs:700, spreadBias:{col:6}, rows:[
    '.RRR.',
    'RYRYR',
    'rrrrr',
    'RYRYR',
    '.RRR.',
    '..G..',
    '..G..',
    '..G..',
    '..G..' ] },
  // 第4关:自定义图案(按图纸精确复刻)
  { name:'🧩 拼图', time:20, locked:[], mystery:[], wild:0, spreadMs:700, rows:[
    'RRYR...',
    '.RGGR..',
    '..GGR..',
    '..GYG..',
    '..GGGR.',
    '...RRRR' ] },
  // 第5关:自定义图案(按图纸精确复刻);绿身静态,黄砖不烧裂
  { name:'🟩 方块', time:44, locked:[], mystery:[], wild:0, spreadMs:700, burnMs:700, burnSlowMs:700, rows:[
    '...........',
    '....Y......',
    '.GGRGRGGG..',
    '.GGRGRGG...',
    '.GGRGRGG...',
    '.YGRGRGG...',
    '.GGRRRGG...',
    '.GGGYYYG...' ] },
  // 第6关:压轴综合关 — 能量反应堆。集齐五种砖,核心考验"放置顺序"策略:
  //   ① 红焰冠正下方紧贴一排"祭品黄底"(无自带护盾) → 必须先把黄底下面那排黑盾建好才能免疫,
  //      否则放满 4 块红焰后黄底会被一块块烧掉(先盾后火);
  //   ② 红焰下方还紧贴绿藤,红焰会烧绿藤——一定能看到烧裂效果,也成了清藤的策略;
  //   ③ 绿藤连成整片,会持续向上吃掉还没填的核心格(黄底/蓝芯/红焰),不赶紧填就被绿锁死;
  //   ④ 蓝芯居中会腐蚀消失 → 留到最后再填;彩虹砖×2 当救命底牌。
  { name:'🔥 能量反应堆 · 综合挑战', time:50, locked:[], mystery:[], wild:2,

// ---------- 开场 3-2-1 倒计时 ----------
function startCountdown() {
  const my = ++countdownToken;
  phase = 'countdown';
  const cd = document.getElementById('countdown');
  const steps = ['3', '2', '1'];
  let i = 0;
  const show = () => {
    if (my !== countdownToken) return;       // 已被新一关取消
    if (i >= steps.length) {                  // 倒计时结束,正式开始
      cd.style.display = 'none';
      phase = 'play';
      deadline = perfNow() + LEVELS[levelIdx].time * 1000;
      lastTick = perfNow();
      lastBurn = perfNow();
      lastSpread = perfNow();
      spreadCounter = 0;
      return;
    }
    cd.textContent = steps[i];
    cd.style.display = 'flex';
    cd.classList.remove('pop'); void cd.offsetWidth; cd.classList.add('pop');  // 重启动画
    const last = (i === steps.length - 1);
    i++;
    setTimeout(show, last ? 600 : 1000);      // "开始!"停留短一些
  };
  show();
}

function updateShatters(dt) {
  if (!shatters.length) return;
  const G = 520;         // 重力(px/s^2)
  for (const p of shatters) {
    p.life += dt;
    if (p.flash || p.kind === 'ring') continue;
    if (p.kind === 'bubble') {                 // 气泡上浮 + 轻微左右摇摆
      p.vy *= 0.99;
      p.vx += Math.sin(p.life * 9 + p.phase) * 10 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      continue;
    }
    if (p.kind === 'smoke') {                  // 烟雾:上升、减速、膨胀
      p.vy *= 0.96;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.size += p.grow * dt;
      continue;
    }
    p.vy += G * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.rot += p.vrot * dt;
    p.vx *= 0.98;        // 轻微空气阻力
  }
  shatters = shatters.filter(p => p.life < p.ttl);
}
function drawShatters() {
  for (const p of shatters) {
    const k = 1 - p.life / p.ttl;              // 1→0 用于淡出
    if (p.flash) {
      const rad = CELL * 0.5 * (1 - k) + 4;
      ctx.save();
      ctx.globalAlpha = k * 0.7;
      ctx.fillStyle = '#fff3c0';
      ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      continue;
    }
    if (p.kind === 'ring') {                    // 绿砖扩散环
      const rad = p.maxR * (1 - k) + 2;
      ctx.save();
      ctx.globalAlpha = Math.max(0, k) * 0.85;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2.5 * k + 0.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
      continue;
    }
    if (p.kind === 'smoke') {                   // 烧裂冒烟:柔和灰色烟团,渐扩渐淡
      ctx.save();
      const a = Math.max(0, k) * 0.4;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      grad.addColorStop(0, `rgba(${p.gray},${p.gray},${p.gray},${a})`);
      grad.addColorStop(1, `rgba(${p.gray},${p.gray},${p.gray},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      continue;
    }
    if (p.kind === 'bubble') {                  // 蓝砖溶解气泡
      ctx.save();
      ctx.globalAlpha = Math.max(0, k) * 0.85;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.5 + 0.5 * k), 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      continue;
    }
    ctx.save();
    ctx.globalAlpha = Math.max(0, k);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    const s = p.size * (0.6 + 0.4 * k);
    ctx.fillRect(-s / 2, -s / 2, s, s);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
// 逐渐扩展的烧裂裂纹 + 焦化变暗 + 边缘余烬微光(p.burn: 0→1)
function drawCracks(x, y, cell) {
  const b = Math.min(1, cell.burn);
  const cx = x + CELL / 2, cy = y + CELL / 2;
  const inset = 4, w = CELL - 8;
  // 基于 crackSeed 的确定性随机,保证同一块砖裂纹形态稳定
  let s = cell.crackSeed || 1;
  const rnd = () => { s = (s * 1664525 + 1013904223) & 0x7fffffff; return s / 0x7fffffff; };

  ctx.save();
  roundRect(x + inset, y + inset, w, w, 5); ctx.clip();

  // ① 焦化:随烧裂加深的暗色覆盖
  ctx.fillStyle = `rgba(40,20,10,${0.45 * b})`;
  ctx.fillRect(x, y, CELL, CELL);

  // ② 裂纹:从中心向外的几条折线,长度随 b 增长
  const branches = 5;
  const maxLen = w * 0.55;
  ctx.lineCap = 'round';
  for (let i = 0; i < branches; i++) {
    const baseAng = (i / branches) * Math.PI * 2 + rnd() * 0.6;
    const len = maxLen * b * (0.6 + rnd() * 0.6);
    let px = cx, py = cy, ang = baseAng;
    ctx.beginPath();
    ctx.moveTo(px, py);
    const segs = 3;
    for (let sgi = 0; sgi < segs; sgi++) {
      ang += (rnd() - 0.5) * 0.9;
      const sl = (len / segs);
      px += Math.cos(ang) * sl;
      py += Math.sin(ang) * sl;
      ctx.lineTo(px, py);
    }
    ctx.strokeStyle = `rgba(20,10,5,${0.55 * Math.min(1, b * 1.3)})`;
    ctx.lineWidth = 2.2 * b + 0.5;
    ctx.stroke();
    // 裂缝里透出的暗红余烬
    ctx.strokeStyle = `rgba(255,90,30,${0.5 * b})`;
    ctx.lineWidth = (2.2 * b + 0.5) * 0.4;
    ctx.stroke();
  }

  // ③ 临碎裂时整体微微发红发亮 + 抖动感的边缘高光
  if (b > 0.55) {
    const g = (b - 0.55) / 0.45;
    ctx.fillStyle = `rgba(255,120,40,${0.25 * g})`;
    ctx.fillRect(x, y, CELL, CELL);
  }
  ctx.restore();
}
let audioCtx;
let soundMuted = false;          // 全局静音开关
function playPlaceSound() {
  if (soundMuted) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const ctx = audioCtx;
  const now = ctx.currentTime;
  const duration = 0.8;
  const freqs = [1046.50, 1318.51, 1567.98];
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.setValueAtTime(800, now);

  freqs.forEach((baseFreq, index) => {
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.type = 'sine';
    const triggerTime = now + (index * 0.012);
    osc.frequency.setValueAtTime(baseFreq, triggerTime);
    gainNode.gain.setValueAtTime(0.25, triggerTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, triggerTime + duration);
    osc.connect(gainNode);
    gainNode.connect(filter);
    osc.start(triggerTime);
    osc.stop(triggerTime + duration);
  });

  const oscClick = ctx.createOscillator();
  const gainClick = ctx.createGain();
  oscClick.type = 'sine';
  oscClick.frequency.setValueAtTime(3135.96, now);
  gainClick.gain.setValueAtTime(0.15, now);
  gainClick.gain.exponentialRampToValueAtTime(0.001, now + 0.015);
  oscClick.connect(gainClick);
  gainClick.connect(filter);
  oscClick.start(now);
  oscClick.stop(now + 0.015);

  const mainGain = ctx.createGain();
  mainGain.gain.setValueAtTime(0.6, now);
  filter.connect(mainGain);
  mainGain.connect(ctx.destination);
}

// ---------- 副作用音效:碎裂 / 蔓延 / 消融 ----------
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// 副作用音效节流:同一种声音在极短时间内只触发一次,避免一波多格叠成噪音
const _sfxLast = {};
function sfx(name, fn, minGap) {
  if (soundMuted) return;
  const t = perfNow();
  if (_sfxLast[name] && t - _sfxLast[name] < (minGap || 70)) return;
  _sfxLast[name] = t;
  try { fn(); } catch (e) {}
}
// 碎裂:一段短噪声 burst 经带通滤波 → "咔嚓/砖块崩碎"的脆响
function playShatterSound() {
  const ac = ensureAudio();
  const now = ac.currentTime;
  const dur = 0.32;
  // 白噪声缓冲
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const t = i / data.length;
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.6);   // 越往后越弱
  }
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(1600, now);
  bp.frequency.exponentialRampToValueAtTime(500, now + dur);    // 音色由脆转闷,像崩落
  bp.Q.value = 0.8;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.5, now + 0.008);        // 极快起音
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  src.connect(bp); bp.connect(g); g.connect(ac.destination);
  src.start(now); src.stop(now + dur);
  // 叠一个低频"咚",增加碎裂的重量感
  const osc = ac.createOscillator(); const og = ac.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(70, now + 0.18);
  og.gain.setValueAtTime(0.3, now);
  og.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(og); og.connect(ac.destination);
  osc.start(now); osc.stop(now + 0.2);
}
// 蔓延:轻快的上滑短音 + 一点噪声沙沙,像藤蔓"啵"地冒出
function playSpreadSound() {
  const ac = ensureAudio();
  const now = ac.currentTime;
  const osc = ac.createOscillator(); const g = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(420, now);
  osc.frequency.exponentialRampToValueAtTime(900, now + 0.14);  // 上滑
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
  osc.connect(g); g.connect(ac.destination);
  osc.start(now); osc.stop(now + 0.24);
  // 一小撮高频沙沙(叶片摩擦感)
  const dur = 0.12;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = ac.createBufferSource(); src.buffer = buf;
  const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 3000;
  const ng = ac.createGain(); ng.gain.setValueAtTime(0.08, now); ng.gain.exponentialRampToValueAtTime(0.001, now + dur);
  src.connect(hp); hp.connect(ng); ng.connect(ac.destination);
  src.start(now); src.stop(now + dur);
}
// 消融:下滑的低沉音 + 滤波噪声,像能量"咻"地溶解蒸发
function playDissolveSound() {
  const ac = ensureAudio();
  const now = ac.currentTime;
  const dur = 0.5;
  const osc = ac.createOscillator(); const g = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(700, now);
  osc.frequency.exponentialRampToValueAtTime(160, now + dur);   // 下滑溶解
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.16, now + 0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(g); g.connect(ac.destination);
  osc.start(now); osc.stop(now + dur);
  // 频率渐降的滤波噪声,营造"咝——"的气泡蒸发声
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) { const t = i / data.length; data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.2); }
  const src = ac.createBufferSource(); src.buffer = buf;
  const lp = ac.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(2200, now);
  lp.frequency.exponentialRampToValueAtTime(300, now + dur);
  const ng = ac.createGain(); ng.gain.setValueAtTime(0.12, now); ng.gain.exponentialRampToValueAtTime(0.001, now + dur);
  src.connect(lp); lp.connect(ng); ng.connect(ac.destination);
  src.start(now); src.stop(now + dur);
}
// 黑砖护住相邻砖:一记温和的低频"嗡"+轻微泛音,像护盾稳住
function playProtectSound() {
  const ac = ensureAudio();
  const now = ac.currentTime;
  [220, 330].forEach((f, i) => {
    const osc = ac.createOscillator(); const g = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, now);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(i ? 0.06 : 0.12, now + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
    osc.connect(g); g.connect(ac.destination);
    osc.start(now); osc.stop(now + 0.45);
  });
}
// 放错颜色:短促的下行"哔噗",提示这格颜色不对
function playWrongSound() {
  const ac = ensureAudio();
  const now = ac.currentTime;
  const osc = ac.createOscillator(); const g = ac.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(300, now);
  osc.frequency.exponentialRampToValueAtTime(150, now + 0.16);
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
  const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1200;
  osc.connect(lp); lp.connect(g); g.connect(ac.destination);
  osc.start(now); osc.stop(now + 0.2);
}

// ---------- 通关音效:星星飞散 ----------
function playWinSound() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const ac = audioCtx;
  const now = ac.currentTime;

  // 高通滤波器:卡死在 1000Hz 以上,声音像冰块撞击一样干净
  const highpassFilter = ac.createBiquadFilter();
  highpassFilter.type = 'highpass';
  highpassFilter.frequency.setValueAtTime(1000, now);
  highpassFilter.connect(ac.destination);

  // 瞬间爆发 50 个微小的超高频水晶颗粒
  const starCount = 50;
  for (let i = 0; i < starCount; i++) {
    const pTrigger = now + (Math.random() * 0.5);
    const pDuration = 0.04 + (Math.random() * 0.08);
    const pFreq = 2800 + (Math.random() * 3700);

    const osc = ac.createOscillator();
    const gainNode = ac.createGain();
    const panner = ac.createStereoPanner ? ac.createStereoPanner() : null;

    osc.type = 'sine';
    osc.frequency.setValueAtTime(pFreq, pTrigger);
    osc.frequency.exponentialRampToValueAtTime(pFreq * 0.88, pTrigger + pDuration);

    gainNode.gain.setValueAtTime(0, pTrigger);
    gainNode.gain.linearRampToValueAtTime(0.08, pTrigger + 0.001);
    gainNode.gain.exponentialRampToValueAtTime(0.001, pTrigger + pDuration);

    osc.connect(gainNode);
    if (panner) {
      panner.pan.setValueAtTime((Math.random() * 2) - 1, pTrigger);
      gainNode.connect(panner);
      panner.connect(highpassFilter);
    } else {
      gainNode.connect(highpassFilter);
    }
    osc.start(pTrigger);
    osc.stop(pTrigger + pDuration);
  }
}

// ---------- 失败音效:物理散落 ----------
function playFailSound() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const ac = audioCtx;
  const now = ac.currentTime;

  // 1. 下行坠落旋律:音调从高到低极速坠落
  const scale = [1046.50, 880.00, 698.46, 587.33];
  const masterFilter = ac.createBiquadFilter();
  masterFilter.type = 'highpass';
  masterFilter.frequency.setValueAtTime(350, now);
  masterFilter.connect(ac.destination);

  scale.forEach((freq, index) => {
    const triggerTime = now + (index * 0.06);
    const noteDuration = 0.6;
    [1.0, 2.0].forEach((harm, hIdx) => {
      const osc = ac.createOscillator();
      const gainNode = ac.createGain();
      osc.type = hIdx === 0 ? 'triangle' : 'sine';
      osc.frequency.setValueAtTime(freq * harm, triggerTime);
      osc.frequency.exponentialRampToValueAtTime(freq * harm * 0.75, triggerTime + noteDuration);
      gainNode.gain.setValueAtTime(0, triggerTime);
      gainNode.gain.linearRampToValueAtTime(hIdx === 0 ? 0.25 : 0.06, triggerTime + 0.002);
      gainNode.gain.exponentialRampToValueAtTime(0.001, triggerTime + noteDuration);
      osc.connect(gainNode).connect(masterFilter);
      osc.start(triggerTime);
      osc.stop(triggerTime + noteDuration);
    });
  });

  // 2. 散落一地的"哗啦"颗粒群
  const dropCount = 45;
  for (let i = 0; i < dropCount; i++) {
    const pTrigger = now + 0.1 + (Math.random() * 0.7);
    const pDuration = 0.06 + (Math.random() * 0.14);
    const isWoodDrop = Math.random() > 0.5;
    const pFreq = isWoodDrop ? (800 + Math.random() * 700) : (2000 + Math.random() * 2500);

    const pOsc = ac.createOscillator();
    const pGain = ac.createGain();
    const panner = ac.createStereoPanner ? ac.createStereoPanner() : null;

    pOsc.type = isWoodDrop ? 'triangle' : 'sine';
    pOsc.frequency.setValueAtTime(pFreq, pTrigger);
    pOsc.frequency.exponentialRampToValueAtTime(pFreq * 0.7, pTrigger + pDuration);

    pGain.gain.setValueAtTime(0, pTrigger);
    pGain.gain.linearRampToValueAtTime(isWoodDrop ? 0.05 : 0.07, pTrigger + 0.002);
    pGain.gain.exponentialRampToValueAtTime(0.001, pTrigger + pDuration);

    pOsc.connect(pGain);
    if (panner) {
      panner.pan.setValueAtTime((Math.random() * 2) - 1, pTrigger);
      pGain.connect(panner);
      panner.connect(masterFilter);
    } else {
      pGain.connect(masterFilter);
    }
    pOsc.start(pTrigger);
    pOsc.stop(pTrigger + pDuration);
  }
}

// ---------- 放置 / 拆除 ----------
cv.addEventListener('mousemove', e => {
  const b = cv.getBoundingClientRect();
  mouse.c = Math.floor((e.clientX - b.left) / CELL);
  mouse.r = Math.floor((e.clientY - b.top) / CELL);
});
cv.addEventListener('mouseleave', () => { mouse.c = mouse.r = -1; });
cv.addEventListener('click', e => {
  if (phase !== 'play') return;
  const b = cv.getBoundingClientRect();
  const c = Math.floor((e.clientX - b.left) / CELL);
  const r = Math.floor((e.clientY - b.top) / CELL);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  if (!inBounds(r, c)) return;   // 非可填充格子禁用,不可点击
  const cell = grid[r][c];
  if (cell) {
    // 被绿色蔓延出来的格子(孢子)已"长死"——不能拆除、不能改颜色
    if (cell.type === 'green' && !cell.byPlayer) {
      flashHint('🌿 这里被绿砖蔓延占据了,无法再改动!');
      return;
    }
    // 拆除:玩家放的回收库存,副作用产生的(孢子)不回收
    if (cell.byPlayer) inventory[cell.type]++;
    grid[r][c] = null;
  } else {
    // 触发解锁:点到尚未解锁的颜色目标格 → 在左侧揭示这块新砖并给出副作用提示
    const tcol = target[r][c];
    if (tcol && lockedSet.has(tcol) && !unlocked.has(tcol)) {
      unlocked.add(tcol); lockedSet.delete(tcol); selected = tcol;
      flashHint(`🎉 发现新材料 · ${BRICKS[tcol].name}:${BRICKS[tcol].desc}`);
      if (inventory[tcol] > 0) {
        grid[r][c] = { type: tcol, byPlayer: true, age: 0, protect: false };
        inventory[tcol]--;
        playPlaceSound();
      }
      buildPanel();
      return;
    }
    if (inventory[selected] > 0) {
      const placed = selected;
      grid[r][c] = { type: placed, byPlayer: true, age: 0, protect: false };
      inventory[placed]--;
      playPlaceSound();
      // 放错颜色提示音(目标格存在且颜色不匹配,彩虹砖万能不算错)
      const tgt = target[r][c];
      if (tgt && placed !== tgt && placed !== 'rainbow') {
        sfx('wrong', playWrongSound, 80);
      }
      // 第一次放下神秘砖 → 揭示并提示其副作用
      if (mysterySet.has(placed) && !revealed.has(placed)) {
        revealed.add(placed);
        flashHint(`🔬 ${BRICKS[placed].name}的副作用:${BRICKS[placed].desc}`);
      }
      if (inventory[placed] === 0) autoSelect();
    }
  }
  buildPanel();
});
function autoSelect() {
  const k = [...unlocked].find(t => inventory[t] > 0);
  if (k) selected = k;
}

let hintTimer;
function flashHint(t) {
  const el = document.getElementById('hint');
  el.textContent = t; clearTimeout(hintTimer);
  hintTimer = setTimeout(() => el.textContent = '照着图纸把每个格子填上对应颜色!', 3500);
}

// ---------- 副作用结算 ----------
const ORTHO = [[-1,0],[1,0],[0,-1],[0,1]];
// 烧裂(连续过程):凡是紧贴"火砖"(type yellow,显示红色)的可燃砖,会从挨近的那一刻
//   起按时间逐渐积累裂纹(cell.burn 0→1),裂满才碎裂消失;相邻有黑砖保护或火砖移开
//   时,裂纹会缓慢自愈。被多块火砖夹住时碎裂更快。
function updateBurn(dt) {
  const lv = LEVELS[levelIdx];
  // 放够 burnAfter 个火砖后才开始烧裂(降低开局难度;默认 0 = 立即烧)
  const burnAfter = lv.burnAfter || 0;
  if (burnAfter > 0) {
    let yc = 0;
    forEach((r, c, cell) => { if (cell && cell.type === 'yellow') yc++; });
    if (yc < burnAfter) return;
  }
  const restrict = burnableSet && burnableSet.size > 0;   // 本关是否限定只烧指定格子
  const base = burnedOnce ? (lv.burnSlowMs || lv.burnMs || TICK_MS) : (lv.burnMs || TICK_MS);
  const crackMs = base * 1.4;        // 从挨近到完全碎裂的基准时长
  const healMs  = base * 2.2;        // 离开火源后自愈所需时长
  const removed = [];
  forEach((r, c, cell) => {
    if (!cell || cell.type === 'yellow' || cell.type === 'black') return;   // 火砖/黑砖不被烧
    if (restrict && !burnableSet.has(r + ',' + c)) return;
    // 统计相邻火砖数 & 是否被黑砖保护
    let fire = 0, guarded = false;
    for (const [dr, dc] of ORTHO) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
      const t = grid[nr][nc];
      if (!t) continue;
      if (t.type === 'black') guarded = true;
      if (t.type === 'yellow') fire++;
    }
    if (fire > 0 && !guarded) {
      if (!cell.burn) {                         // 首次被点燃:固定裂纹形态与个体速度差异
        cell.burn = 0;
        cell.crackSeed = (Math.random() * 1e9) | 0;
        cell.crackMul = 0.8 + Math.random() * 0.5;
      }
      cell.burn += dt * 1000 / (crackMs * cell.crackMul) * fire;
      if (cell.burn >= 1) removed.push([r, c]);
    } else if (fire > 0 && guarded) {           // 紧贴火砖但被黑砖护住:护盾反馈音
      sfx('protect', playProtectSound, 600);
      if (cell.burn) { cell.burn -= dt * 1000 / healMs; if (cell.burn < 0) cell.burn = 0; }
    } else if (cell.burn) {                     // 离开火源:缓慢自愈
      cell.burn -= dt * 1000 / healMs;
      if (cell.burn < 0) cell.burn = 0;
    }
  });
  if (removed.length) {
    removed.forEach(([r, c]) => { if (grid[r][c]) spawnShatter(r, c, grid[r][c].type); grid[r][c] = null; });
    burnedOnce = true;   // 标记已发生首次烧裂(之后烧裂节奏变慢)
    buildPanel();
  }
}

function runTick() {
  // 蓝砖:能量倒计时,放下几个结算回合后腐蚀消失
  forEach((r,c,cell) => {
    if (cell && cell.type === 'blue') {
      cell.age++;
      if (cell.age >= 3) { spawnDissolve(r, c, 'blue'); grid[r][c] = null; }
    }
  });
}

// 绿砖蔓延:独立计时(lv.spreadMs,可快于结算回合 TICK_MS)。
//   所有绿砖(含蔓延出的孢子)都可作为蔓延源,每"蔓延波"全局最多新增固定块数,
//   使扩散速度恒定、不随绿砖数量指数爆炸。
//   绿砖只蔓延到相邻的空格;任何已填充的格子(其它颜色或绿砖)都不会被覆盖、不变色。
//   若本关配置 spreadBias:{col},则优先向上/向中心快速蔓延,
//   其他方向(向下/向外)蔓延很慢——制造"不赶紧填就被绿吞掉"的压力。
function doSpread() {
  const lv = LEVELS[levelIdx];
  const plant = (nr,nc) => { if (!grid[nr][nc]) { grid[nr][nc] = { type:'green', byPlayer:false, age:0, protect:false }; spawnSprout(nr, nc); } };
  // 只蔓延到空格;任何已填充的格子(含其它颜色和绿砖)都不被覆盖、不变色
  const takeable = (nr,nc) => !grid[nr][nc];

  if (lv.spreadBias) {
    const cx = lv.spreadBias.col;
    const cands = [];   // [绿源r,绿源c, 目标nr,目标nc]
    forEach((r,c,cell) => {
      if (cell && cell.type === 'green') {
        // 蔓延到相邻可填充格子;不再要求该格目标为绿,已填的其它颜色也会被覆盖
        neigh(r,c, (nr,nc) => { if (takeable(nr,nc)) cands.push([r,c,nr,nc]); });
      }
    });
    if (!cands.length) return;
    // 方向打分:向上 +2,向中心列靠拢 +1;0 分=向下/向外
    const score = ([r,c,nr,nc]) => (nr < r ? 2 : 0) + (Math.abs(nc-cx) < Math.abs(c-cx) ? 1 : 0);
    const prefer = cands.filter(x => score(x) > 0);
    const other  = cands.filter(x => score(x) === 0);
    let placed = 0;
    while (placed < 2 && prefer.length) {           // 优先方向每波最多铺 2 格(快)
      const [, , nr, nc] = prefer.splice(Math.floor(Math.random()*prefer.length), 1)[0];
      if (takeable(nr,nc)) { plant(nr,nc); placed++; }
    }
    // 其他方向:仅在优先方向铺不满时,以较低概率慢慢蔓延 1 格
    if (placed < 2 && other.length && Math.random() < 0.25) {
      const [, , nr, nc] = other.splice(Math.floor(Math.random()*other.length), 1)[0];
      plant(nr,nc);
    }
    return;
  }

  // 默认:按绿砖分组随机,各方向均匀蔓延(可覆盖已填的其它颜色)
  const spreadable = [];
  forEach((r,c,cell) => {
    if (cell && cell.type === 'green') {
      const opts = [];
      neigh(r,c, (nr,nc) => { if (takeable(nr,nc)) opts.push([nr,nc]); });
      if (opts.length) spreadable.push(opts);
    }
  });
  const SPREAD_PER_WAVE = 2;   // 每波最多新增几块绿
  for (let n = 0; n < SPREAD_PER_WAVE && spreadable.length; n++) {
    const opts = spreadable.splice(Math.floor(Math.random() * spreadable.length), 1)[0];
    const [gr, gc] = opts[Math.floor(Math.random() * opts.length)];
    plant(gr, gc);
  }
}
function forEach(fn) { for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) fn(r,c,grid[r][c]); }
function neigh(r,c,fn) { ORTHO.forEach(([dr,dc]) => { const nr=r+dr,nc=c+dc; if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&inBounds(nr,nc)) fn(nr,nc); }); }
// 仅"可填充的颜色格子"(图纸里有目标颜色的格子)可交互;其余格子禁用,不能放置/拆除/蔓延
function inBounds(r,c){ return !!(target && target[r] && target[r][c]); }

// ---------- 完成度 / 胜负 ----------
function evalProgress() {
  let total = 0, ok = 0;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const t = target[r][c];
    if (!t) continue;
    total++;
    const f = grid[r][c];
    if (f && (f.type === t || f.type === 'rainbow')) ok++;
  }
  return { ok, total, pct: total ? ok/total : 0 };
}
function checkEnd() {
  const p = evalProgress();
  if (p.total > 0 && p.ok === p.total) { phase = 'win'; showWin(); return; }
  if (perfNow() >= deadline) { phase = 'lose'; showLose(); }
}

// ---------- 渲染 ----------
function draw() {
  ctx.clearRect(0,0,cv.width,cv.height);

  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const x = c*CELL, y = r*CELL, t = target[r][c], f = grid[r][c];
    // 非可填充格子(图纸里没有目标颜色):禁用,画成淡色遮罩,不可交互
    if (!inBounds(r, c)) {
      ctx.fillStyle = 'rgba(0,0,0,.08)';
      ctx.fillRect(x, y, CELL, CELL);
      continue;
    }
    // 图纸目标提示(空格时显示淡色虚线轮廓)
    if (t && !f) {
      // 黄色格(type red, 显示黄色)未填充时底色更浅、更透
      const fillA = (t === 'red') ? .07 : .14;
      ctx.fillStyle = hexA(t, fillA); ctx.fillRect(x+3,y+3,CELL-6,CELL-6);
      // 黄格底色暗,虚线改用更亮的黄并提高不透明度,加强对比
      ctx.strokeStyle = (t === 'red') ? 'rgba(180,120,40,.95)' : hexA(t, .6);
      ctx.lineWidth = 2; ctx.setLineDash([5,4]);
      ctx.strokeRect(x+4,y+4,CELL-8,CELL-8); ctx.setLineDash([]);
    }
    // 已放置的砖
    if (f) {
      drawBrick(x, y, f.type, f.age);
      // 被绿砖蔓延占据的格子(孢子):不可替换 → 压暗 + 暗色描边,与玩家放的砖区分
      if (f.type === 'green' && !f.byPlayer) {
        ctx.save();
        roundRect(x+4, y+4, CELL-8, CELL-8, 5); ctx.clip();
        ctx.fillStyle = 'rgba(0,0,0,.4)';
        ctx.fillRect(x, y, CELL, CELL);
        ctx.restore();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(20,60,20,.85)';
        roundRect(x+4, y+4, CELL-8, CELL-8, 5); ctx.stroke();
      }
      if (f.burn > 0) drawCracks(x, y, f);     // 正在被烤裂:画逐渐扩展的裂纹
      // 填对了不描边;放错颜色(含绿砖蔓延占错格)时,用该格应有的正确颜色描边提示
      const correct = t && (f.type === t || f.type === 'rainbow');
      if (t && !correct) {
        ctx.lineWidth = 3;
        ctx.strokeStyle = COLORS[t];
        ctx.setLineDash([5,4]);
        roundRect(x+3,y+3,CELL-6,CELL-6,2); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }
  // 网格线(画在格子之上;坐标 +0.5 对齐像素,保证细线清晰锐利)
  ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.lineWidth = 1;
  for (let r=0;r<=ROWS;r++){ const y=Math.round(r*CELL)+0.5; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cv.width,y); ctx.stroke(); }
  for (let c=0;c<=COLS;c++){ const x=Math.round(c*CELL)+0.5; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cv.height); ctx.stroke(); }
  // 鼠标悬停高亮(画布之外不高亮)
  if (mouse.c>=0 && mouse.r>=0 && mouse.c<COLS && mouse.r<ROWS && phase==='play' && inBounds(mouse.r, mouse.c)) {
    ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 2;
    ctx.strokeRect(mouse.c*CELL+1, mouse.r*CELL+1, CELL-2, CELL-2);
  }
  // 烧裂碎块(画在最上层)
  drawShatters();
}
function drawBrick(x,y,type,age) {
  // 有对应图片且已加载 → 用图片绘制(裁切成圆角方块)
  const img = BRICK_IMG[type];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.save();
    roundRect(x+4,y+4,CELL-8,CELL-8,5); ctx.clip();
    ctx.drawImage(img, x+4, y+4, CELL-8, CELL-8);
    ctx.restore();
    return;
  }
  let fill = COLORS[type];
  if (type === 'rainbow') {
    const g = ctx.createLinearGradient(x,y,x+CELL,y+CELL);
    ['#ff5d5d','#ffce4e','#6dd86d','#5d9ce8','#b15de8'].forEach((c,i,a)=>g.addColorStop(i/(a.length-1),c));
    fill = g;
  }
  ctx.fillStyle = fill;
  ctx.globalAlpha = (type==='blue') ? Math.max(.3, 1 - age*0.3) : 1; // 蓝砖腐蚀渐隐
  roundRect(x+4,y+4,CELL-8,CELL-8,5); ctx.fill();
  ctx.globalAlpha = 1;
  // 乐高凸点
  ctx.fillStyle = 'rgba(255,255,255,.25)';
  ctx.beginPath(); ctx.arc(x+CELL*0.36, y+CELL*0.32, 4, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(x+CELL*0.64, y+CELL*0.32, 4, 0, 7); ctx.fill();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function hexA(type, a) {
  const h = type==='rainbow' ? '#b15de8' : COLORS[type];
  const n = parseInt(h.slice(1),16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;
}

// ---------- 面板 / HUD ----------
// 增量更新:按钮只创建一次,之后原地更新数量/状态。
// 避免每次出效果(蔓延/烧裂)都删除重建按钮,导致玩家点击的瞬间元素被替换、click 丢失。
function buildPanel() {
  const panel = document.getElementById('panel');
  // 移除已不再解锁的按钮(切换关卡时)
  panel.querySelectorAll('.brick-btn').forEach(btn => {
    if (!unlocked.has(btn.dataset.key)) btn.remove();
  });
  Object.keys(BRICKS).forEach(key => {
    if (!unlocked.has(key)) return;   // 未解锁的砖不出现在材料库
    const def = BRICKS[key], qty = inventory[key];
    let btn = panel.querySelector(`.brick-btn[data-key="${key}"]`);
    if (!btn) {                       // 首次出现:创建并绑定一次点击
      btn = document.createElement('div');
      btn.dataset.key = key;
      const sw = key==='rainbow'
        ? 'background:linear-gradient(45deg,#ff5d5d,#ffce4e,#6dd86d,#5d9ce8,#b15de8)'
        : (IMG_SRC[key] ? `background:url('${IMG_SRC[key]}') center/cover no-repeat` : `background:${COLORS[key]}`);
      btn.innerHTML = `<div class="swatch" style="${sw}"></div>
        <div class="info"></div>
        <div class="qty"></div>`;
      // 用实时 inventory[key] 判断,而非闭包旧值
      btn.addEventListener('click', () => { if (inventory[key] > 0) { selected = key; buildPanel(); } });
      panel.appendChild(btn);
    }
    // 原地更新:选中态/空态、说明文案、数量
    btn.className = 'brick-btn' + (key===selected?' active':'') + (qty<=0?' empty':'');
    btn.querySelector('.info').innerHTML = `<b>${def.name}</b>${revealed.has(key) ? `<br><span>${def.desc}</span>` : ''}`;
    btn.querySelector('.qty').textContent = qty;
  });
}
function updateHUD() {
  const p = evalProgress();
  document.getElementById('prog-txt').textContent = Math.round(p.pct*100) + '%';
  document.querySelector('#progbar i').style.width = (p.pct*100) + '%';
  const left = Math.max(0, Math.ceil((deadline - perfNow())/1000));
  const tEl = document.getElementById('timer');
  tEl.innerHTML = '<img class="timer-ico" src="clock.png" alt=""> <b>' + left + '</b>s';
  tEl.classList.toggle('low', left <= 10);
}

// ---------- 胜负界面 ----------
function showWin() {
  playWinSound();
  // 通关后解锁下一关并保存进度
  const reached = Math.min(LEVELS.length - 1, levelIdx + 1);
  if (reached > maxUnlocked) { maxUnlocked = reached; saveProgress(); renderLevelBar(); }

  const ov = document.getElementById('overlay');
  const last = levelIdx >= LEVELS.length - 1;
  document.getElementById('ov-title').innerHTML = last
    ? '🏆 全部完成!'
    : '<img class="ov-icon" src="ok.png" alt="">完成订单!';
  document.getElementById('ov-sub').textContent = last
    ? '你顶住了所有捣乱,通关啦!'
    : '顾客很满意,准备下一单~';
  const btn = document.getElementById('ov-btn');
  btn.textContent = last ? '从头再玩' : '下一关 →';
  btn.onclick = () => { levelIdx = last ? 0 : levelIdx + 1; loadLevel(levelIdx); };
  ov.style.display = 'flex';
}
function showLose() {
  playFailSound();
  const ov = document.getElementById('overlay');
  const p = evalProgress();
  document.getElementById('ov-title').innerHTML = '<img class="ov-icon" src="clock.png" alt="">时间到';
  document.getElementById('ov-sub').textContent =
    `捣蛋鬼把进度拖垮了,只完成 ${Math.round(p.pct*100)}%`;
  const btn = document.getElementById('ov-btn');
  btn.textContent = '重试本关';
  btn.onclick = () => loadLevel(levelIdx);
  ov.style.display = 'flex';
}

// ---------- 主循环 ----------
function loop() {
  // 帧间隔(秒);暂停时冻结,切后台回来不跳帧
  const now = perfNow();
  let dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (dt > 0.05) dt = 0.05;

  if (phase === 'play') {
    if (perfNow() - lastTick >= TICK_MS) { runTick(); lastTick = perfNow(); buildPanel(); }
    const spreadMs = LEVELS[levelIdx].spreadMs || TICK_MS;
    if (perfNow() - lastSpread >= spreadMs) { doSpread(); lastSpread = perfNow(); buildPanel(); }
    updateBurn(dt);                 // 烧裂改为逐帧连续积累裂纹
    updateHUD();
    checkEnd();
  }
  if (phase !== 'paused') updateShatters(dt);
  draw();
  requestAnimationFrame(loop);
}

// ---------- 关卡进度(本地存档) ----------
let maxUnlocked = 0;   // 已解锁到的最高关索引
const DEBUG_ALL_LEVELS = false;   // 调试:为 true 时所有关卡都可直接跳转(发布前改回 false)
function loadProgress() {
  // URL 带 ?reset(或 #reset)时清空解锁进度,方便测试从头开始
  if (/(?:[?&#])reset\b/.test(location.search + location.hash)) {
    try { localStorage.removeItem('sebricks_progress'); } catch (e) {}
    maxUnlocked = 0;
    return;
  }
  try { const v = parseInt(localStorage.getItem('sebricks_progress')); if (!isNaN(v)) maxUnlocked = v; } catch (e) {}
}
function saveProgress() {
  try { localStorage.setItem('sebricks_progress', String(maxUnlocked)); } catch (e) {}
}

// ---------- 底部常驻关卡条 ----------
function renderLevelBar() {
  const bar = document.getElementById('lvbar'); bar.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const ok = DEBUG_ALL_LEVELS || i <= maxUnlocked;
    const c = document.createElement('button');
    c.className = 'lvchip' + (ok ? '' : ' locked') + (i === levelIdx ? ' current' : '');
    c.title = ok ? lv.name : '通关上一关后解锁';
    const ICON_IMG = { 0: 'tianchong.png', 1: 'broke.png', 2: 'spread.png', 3: 'xietiao.png', 4: 'distance.png', 5: 'dk.png', 6: 'freedom.png' };
    let icoHtml;
    if (!ok) icoHtml = '🔒';
    else if (ICON_IMG[i]) icoHtml = `<img class="ico-img" src="${ICON_IMG[i]}" alt="">`;
    else icoHtml = Array.from(lv.name)[0];
    c.innerHTML = `<span class="ico">${icoHtml}</span>
      <span class="n">第${i+1}关</span>`;
    if (ok) c.onclick = () => { levelIdx = i; loadLevel(i); };
    bar.appendChild(c);
  });
  // 自动把当前关滚动到可视中间
  const cur = bar.querySelector('.lvchip.current');
  if (cur) bar.scrollLeft = cur.offsetLeft - bar.clientWidth / 2 + cur.clientWidth / 2;
}

// ---------- 暂停 / 继续 ----------
let pausedRemain = 0;
function togglePause() {
  if (phase === 'play') {
    phase = 'paused';
    pausedRemain = deadline - perfNow();   // 记住剩余倒计时
    document.getElementById('pausemask').style.display = 'flex';
    document.getElementById('pause').textContent = '▶ 继续';
  } else if (phase === 'paused') {
    deadline = perfNow() + pausedRemain;   // 补偿暂停期间流逝的时间
    lastTick = perfNow();
    lastBurn = perfNow();
    lastSpread = perfNow();
    phase = 'play';
    document.getElementById('pausemask').style.display = 'none';
    document.getElementById('pause').textContent = '⏸ 暂停';
  }
}

loadProgress();
document.getElementById('reset').onclick = () => loadLevel(levelIdx);
document.getElementById('pause').onclick = togglePause;
document.getElementById('pausemask').onclick = togglePause;
// 全局静音开关
(function setupMute() {
  const btn = document.getElementById('mute');
  if (!btn) return;
  try { soundMuted = localStorage.getItem('sebricks_muted') === '1'; } catch (e) {}
  const sync = () => { btn.textContent = soundMuted ? '🔇 静音' : '🔊 音效'; btn.classList.toggle('muted', soundMuted); };
  sync();
  btn.onclick = () => {
    soundMuted = !soundMuted;
    try { localStorage.setItem('sebricks_muted', soundMuted ? '1' : '0'); } catch (e) {}
    sync();
  };
})();
// 空格键暂停 / 继续(仅在游戏进行或暂停时生效,避免开场弹窗/倒计时期间误触)
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.key === ' ') {
    if (phase === 'play' || phase === 'paused') {
      e.preventDefault();
      togglePause();
    }
  }
});
document.getElementById('intro-btn').onclick = () => beginLevel(levelIdx);

levelIdx = 0;
// 开屏:点击"开始游戏"后才进入第一关
// 开屏视频:全屏铺满播放一次,播完才浮现"开始游戏"等界面。
// 浏览器禁止"带声音自动播放",故先静音自动播放保证画面一定动,
// 一旦用户有任意交互(移动/点击/触摸/按键)立即取消静音。
(function setupSplash() {
  const vid = document.getElementById('splash-video');
  const ui = document.getElementById('splash-ui');
  if (!vid) return;
  vid.muted = true;                       // 先静音,确保自动播放不被拦截
  vid.play().catch(() => {});
  // 注意:鼠标移动(mousemove)不算"有效用户手势",在 mousemove 里取消静音会被浏览器
  // 当成"无手势的有声播放"而暂停视频。因此只用 点击/触摸/按键 这类真实手势取消静音。
  const unmute = () => {
    vid.muted = false; vid.volume = 1;
    vid.play().catch(() => {              // 万一仍被拦截,退回静音继续播放,保证画面不卡住
      vid.muted = true; vid.play().catch(() => {});
    });
    window.removeEventListener('pointerdown', unmute);
    window.removeEventListener('keydown', unmute);
    window.removeEventListener('touchstart', unmute);
  };
  window.addEventListener('pointerdown', unmute);
  window.addEventListener('keydown', unmute);
  window.addEventListener('touchstart', unmute);

  // 播放结束 → 显示开始界面;视频停在最后一帧作为背景
  const skipBtn = document.getElementById('splash-skip');
  let revealed = false;
  const reveal = () => {
    if (revealed) return; revealed = true;
    if (ui) ui.classList.add('show');
    if (skipBtn) skipBtn.style.display = 'none';   // 显示开始界面后隐藏"跳过"按钮
  };
  vid.addEventListener('ended', reveal);
  // 兜底:视频缺失/无法播放时也能进入游戏
  vid.addEventListener('error', reveal);
  // 右上角"跳过动画":直接跳到结尾并显示开始界面
  if (skipBtn) skipBtn.addEventListener('click', () => {
    try { vid.pause(); } catch (e) {}
    reveal();
  });
  // 二次兜底:按视频时长 + 缓冲做超时,防止 ended 事件偶发丢失导致按钮永不出现
  vid.addEventListener('loadedmetadata', () => {
    if (isFinite(vid.duration) && vid.duration > 0) {
      setTimeout(reveal, (vid.duration + 0.8) * 1000);
    }
  });
})();
document.getElementById('splash-start').onclick = () => {
  const sp = document.getElementById('splash');
  const vid = document.getElementById('splash-video');
  if (vid) { vid.pause(); }
  sp.classList.add('hide');
  setTimeout(() => sp.remove(), 500);
  loadLevel(0);
  loop();
};
</script>
